# Server Configuration
server:
  port: ${PORT:0}

# Spring Configuration
spring:
  application:
    name: ms-booking
  # Database
  datasource:
    url: jdbc:h2:mem:hotel_bookings;DB_CLOSE_DELAY=-1
    driverClassName: org.h2.Driver
    username: ${SPRING_H2_USERNAME:sa}
    password: ${SPRING_H2_PASSWORD:sa}
  # JPA
  jpa:
    show-sql: true
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.H2Dialect
    open-in-view: false
  # H2
  h2:
    console:
      enabled: true
      path: /h2-console
  # Security OAuth2
  security:
    oauth2:
      resource-server:
        jwt:
          issuer-uri: http://localhost:8080/realms/ecommerce-rta
          jwk-set-uri: ${spring.security.oauth2.resource-server.jwt.issuer-uri}/protocol/openid-connect/certs
  # Cloud
  cloud:
    openfeign:
      client:
        config:
          default:
            connectTimeout: 5000
            readTimeout: 5000

# Eureka
eureka:
  instance:
    hostname: localhost
    instance-id: ${spring.application.name}:${spring.application.instance_id:${random.value}}
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka
