version: '3.9'

services:
  # Frontend
  hotel_frontend:
    build: ./hotel_frontend
    ports:
      - "8091:80"
    depends_on:
      - ms-gateway
    networks:
      - hotelnet

  # Backend microservices (example: ms-user, repeat for all)
  ms-user:
    build: ./microservices-keycloak/ms-user
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_NAME=hotel
      - DB_USER=hotel
      - DB_PASS=hotelpass
    depends_on:
      - mysql
      - keycloak
    networks:
      - hotelnet

  ms-room:
    build: ./microservices-keycloak/ms-room
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_NAME=hotel
      - DB_USER=hotel
      - DB_PASS=hotelpass
    depends_on:
      - mysql
      - keycloak
    networks:
      - hotelnet

  ms-gateway:
    build: ./microservices-keycloak/ms-gateway
    ports:
      - "9090:9090"
    depends_on:
      - ms-user
      - ms-room
      - keycloak
    networks:
      - hotelnet

  # Keycloak
  keycloak:
    image: quay.io/keycloak/keycloak:24.0.1
    command: start-dev
    environment:
      - KEYCLOAK_ADMIN=admin
      - KEYCLOAK_ADMIN_PASSWORD=admin
      - KC_DB=mysql
      - KC_DB_URL_HOST=mysql
      - KC_DB_URL_DATABASE=keycloak
      - KC_DB_USERNAME=keycloak
      - KC_DB_PASSWORD=keycloakpass
    ports:
      - "8080:8080"
    depends_on:
      - mysql
    networks:
      - hotelnet

  # MySQL
  mysql:
    image: mysql:8.0
    environment:
      - MYSQL_ROOT_PASSWORD=rootpass
      - MYSQL_DATABASE=hotel
      - MYSQL_USER=hotel
      - MYSQL_PASSWORD=hotelpass
      - MYSQL_ALLOW_EMPTY_PASSWORD=no
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - hotelnet

  # MongoDB
  mongo:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    networks:
      - hotelnet

  # H2 (optional, for dev/demo)
  h2:
    image: oscarfonts/h2
    ports:
      - "9092:1521"
      - "8181:81"
    networks:
      - hotelnet

volumes:
  mysql_data:
  mongo_data:

networks:
  hotelnet:
    driver: bridge
